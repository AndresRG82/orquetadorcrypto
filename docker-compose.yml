services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-trader}
      POSTGRES_USER: ${TIMESCALE_USER:-trader}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-trader}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  market-scanner:
    build:
      context: .
      dockerfile: services/market-scanner/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      EXCHANGE: ${EXCHANGE:-binance}
      MOCK_MODE: ${MOCK_MODE:-true}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  qwen-analyzer:
    build:
      context: .
      dockerfile: services/qwen-analyzer/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - trader-net

  strategy-scalping:
    build:
      context: .
      dockerfile: services/strategy-scalping/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: scalping
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  strategy-swing:
    build:
      context: .
      dockerfile: services/strategy-swing/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: swing
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  strategy-arbitrage:
    build:
      context: .
      dockerfile: services/strategy-arbitrage/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: arbitrage
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  risk-manager:
    build:
      context: .
      dockerfile: services/risk-manager/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      MAX_POSITION_PCT: ${MAX_POSITION_PCT:-0.20}
      MAX_DRAWDOWN_PCT: ${MAX_DRAWDOWN_PCT:-0.10}
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  paper-trading:
    build:
      context: .
      dockerfile: services/paper-trading/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
      PT_INSTANCE: main
      PT_STATE_KEY: paper_trading:state
      PT_STATS_KEY: portfolio:stats
      PT_VENUE: bybit_testnet
      BYBIT_API_2_KEY: ${BYBIT_API_KEY}
      BYBIT_API_2_SECRET: ${BYBIT_API_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "${DASHBOARD_PORT:-8001}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    volumes:
      - monitoring_logs:/app/logs/monitoring
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./services/dashboard/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - timescaledb
    networks:
      - trader-net

  stop-loss:
    build:
      context: .
      dockerfile: services/stop-loss/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
  stop-loss-tracker:
    build:
      context: .
      dockerfile: services/stop-loss-tracker/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
  feedback:
    build:
      context: .
      dockerfile: services/qwen-analyzer/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - trader-net
    command: ["python", "/app/service/feedback.py"]
    profiles: ["disabled"]

  strategy-router:
    build:
      context: .
      dockerfile: services/strategy-router/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  sentiment:
    build:
      context: .
      dockerfile: services/sentiment/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  backtesting:
    build:
      context: .
      dockerfile: services/backtesting/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - backtest_data:/app/data
    restart: unless-stopped
    networks:
      - trader-net
  training-export:
    build:
      context: .
      dockerfile: services/training-export/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - training_data:/app/data
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  evolution-agent:
    build:
      context: .
      dockerfile: services/evolution-agent/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - evolution_data:/app/data
    restart: unless-stopped
    networks:
      - trader-net
  circuit-breaker:
    build:
      context: .
      dockerfile: services/circuit-breaker/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  ab-promoter:
    build:
      context: .
      dockerfile: services/ab-promoter/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  regime-detector:
    build:
      context: .
      dockerfile: services/regime-detector/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["disabled"]

  watchdog:
    build:
      context: ./services/watchdog
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  monitoring:
    build:
      context: .
      dockerfile: services/monitoring/Dockerfile
    environment:
      DASHBOARD_URL: http://dashboard:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - monitoring_logs:/app/logs/monitoring
    depends_on:
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started
    restart: unless-stopped
    networks:
      - trader-net

  nautilus-bridge:
    build:
      context: .
      dockerfile: services/nautilus-bridge/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: trader
      DB_USER: trader
      DB_PASSWORD: trader123
      NAUTILUS_ENABLED: "true"
    depends_on:
      - redis
      - timescaledb
    restart: unless-stopped
    networks:
      - trader-net
    profiles: ["nautilus"]

  swarm-coordinator:
    build:
      context: .
      dockerfile: services/swarm-coordinator/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: gemma3:4b
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - trader-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["swarm"]

volumes:
  redis_data:
  timescale_data:
  backtest_data:
  training_data:
  evolution_data:
  grafana_data:
  monitoring_logs:

networks:
  trader-net:
    driver: bridge