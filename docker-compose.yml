services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-trader}
      POSTGRES_USER: ${TIMESCALE_USER:-trader}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-trader}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  market-scanner:
    build:
      context: .
      dockerfile: services/market-scanner/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      EXCHANGE: ${EXCHANGE:-binance}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  qwen-analyzer:
    build:
      context: .
      dockerfile: services/qwen-analyzer/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - trader-net

  strategy-scalping:
    build:
      context: .
      dockerfile: services/strategy-scalping/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: scalping
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  strategy-swing:
