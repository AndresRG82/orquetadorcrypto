services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-trader}
      POSTGRES_USER: ${TIMESCALE_USER:-trader}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-trader}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  market-scanner:
    build:
      context: .
      dockerfile: services/market-scanner/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      EXCHANGE: ${EXCHANGE:-binance}
      MOCK_MODE: ${MOCK_MODE:-true}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  market-scanner-okx:
    build:
      context: .
      dockerfile: services/market-scanner-okx/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  qwen-analyzer:
    build:
      context: .
      dockerfile: services/qwen-analyzer/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - trader-net

  strategy-scalping:
    build:
      context: .
      dockerfile: services/strategy-scalping/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: scalping
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  strategy-swing:
    build:
      context: .
      dockerfile: services/strategy-swing/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: swing
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  # PAUSADO Jul 3 2026 — PF=0.04 en 438 trades (-$301). Reactivar cuando walk-forward
  # tenga ≥60 días OHLCV reales (~Sep 27 2026) con parámetros re-optimizados.
  strategy-arbitrage:
    build:
      context: .
      dockerfile: services/strategy-arbitrage/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      QWEN_ANALYZER_URL: http://qwen-analyzer:8000
      STRATEGY: arbitrage
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  risk-manager:
    build:
      context: .
      dockerfile: services/risk-manager/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      MAX_POSITION_PCT: ${MAX_POSITION_PCT:-0.20}
      MAX_DRAWDOWN_PCT: ${MAX_DRAWDOWN_PCT:-0.10}
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      MAX_POSITIONS_PAPER: ${MAX_POSITIONS_PAPER:-10}
      MAX_POSITIONS_OKX_SPOT: ${MAX_POSITIONS_OKX_SPOT:-6}
      MAX_POSITIONS_OKX_SWAP: ${MAX_POSITIONS_OKX_SWAP:-4}
      RISK_AUTOTUNE_ENABLED: ${RISK_AUTOTUNE_ENABLED:-false}
      RISK_AUTOTUNE_INTERVAL: ${RISK_AUTOTUNE_INTERVAL:-300}
      RISK_AUTOTUNE_MODEL: ${RISK_AUTOTUNE_MODEL:-qwen2.5:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  paper-trading:
    build:
      context: .
      dockerfile: services/paper-trading/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
      MAX_POSITIONS_PAPER: ${MAX_POSITIONS_PAPER:-10}
      MAX_POSITIONS_OKX_SPOT: ${MAX_POSITIONS_OKX_SPOT:-6}
      MAX_POSITIONS_OKX_SWAP: ${MAX_POSITIONS_OKX_SWAP:-4}
      PT_INSTANCE: main
      PT_STATE_KEY: paper_trading:state
      PT_STATS_KEY: portfolio:stats
      PT_VENUE: paper
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "${DASHBOARD_PORT:-8001}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    volumes:
      - monitoring_logs:/app/logs/monitoring
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./services/dashboard/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - timescaledb
    networks:
      - trader-net

  stop-loss:
    build:
      context: .
      dockerfile: services/stop-loss/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net
  sentiment:
    build:
      context: .
      dockerfile: services/sentiment/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  backtesting:
    build:
      context: .
      dockerfile: services/backtesting/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - backtest_data:/app/data
    restart: unless-stopped
    networks:
      - trader-net
  evolution-agent:
    build:
      context: .
      dockerfile: services/evolution-agent/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      EVO_START_DATE: ${EVO_START_DATE:-2026-06-16}
      EVO_MIN_RR: ${EVO_MIN_RR:-1.1}
      EVO_SWEEP_ENABLED: ${EVO_SWEEP_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - evolution_data:/app/data
    restart: unless-stopped
    networks:
      - trader-net
  circuit-breaker:
    build:
      context: .
      dockerfile: services/circuit-breaker/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  regime-detector:
    build:
      context: .
      dockerfile: services/regime-detector/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  watchdog:
    build:
      context: ./services/watchdog
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  monitoring:
    build:
      context: .
      dockerfile: services/monitoring/Dockerfile
    environment:
      DASHBOARD_URL: http://dashboard:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - monitoring_logs:/app/logs/monitoring
    networks:
      - trader-net
    depends_on:
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started
  paper-trading-okx:
    build:
      context: .
      dockerfile: services/paper-trading/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
      PT_INSTANCE: okx
      MAX_POSITIONS_PAPER: ${MAX_POSITIONS_PAPER:-10}
      MAX_POSITIONS_OKX_SPOT: ${MAX_POSITIONS_OKX_SPOT:-6}
      MAX_POSITIONS_OKX_SWAP: ${MAX_POSITIONS_OKX_SWAP:-4}
      PT_STATE_KEY: paper_trading:state:okx
      PT_STATS_KEY: portfolio:stats:okx
      PT_VENUE: okx_testnet
      PAPER_EXCHANGE: okx
      OKX_API_2_KEY: ${OKX_API_KEY}
      OKX_API_2_SECRET: ${OKX_API_SECRET}
      OKX_API_PASSWORD: ${OKX_API_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

  paper-trading-okx-swap:
    build:
      context: .
      dockerfile: services/paper-trading/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${TIMESCALE_DB:-trader}
      DB_USER: ${TIMESCALE_USER:-trader}
      DB_PASSWORD: ${TIMESCALE_PASSWORD:-trader123}
      SLIPPAGE_PCT: ${SLIPPAGE_PCT:-0.001}
      TRADING_FEE_PCT: ${TRADING_FEE_PCT:-0.00075}
      INITIAL_CAPITAL: ${INITIAL_CAPITAL:-1000.0}
      BASE_CURRENCY: ${BASE_CURRENCY:-USDT}
      PT_INSTANCE: okx-swap
      MAX_POSITIONS_PAPER: ${MAX_POSITIONS_PAPER:-10}
      MAX_POSITIONS_OKX_SPOT: ${MAX_POSITIONS_OKX_SPOT:-6}
      MAX_POSITIONS_OKX_SWAP: ${MAX_POSITIONS_OKX_SWAP:-4}
      PT_STATE_KEY: paper_trading:state:okx_swap
      PT_STATS_KEY: portfolio:stats:okx_swap
      PT_VENUE: okx_swap_testnet
      PAPER_EXCHANGE: okx
      PT_SWAP_ENABLED: "true"
      PT_LEVERAGE: "3"
      OKX_API_2_KEY: ${OKX_API_KEY}
      OKX_API_2_SECRET: ${OKX_API_SECRET}
      OKX_API_PASSWORD: ${OKX_API_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-net

volumes:
  redis_data:
  timescale_data:
  backtest_data:
  evolution_data:
  grafana_data:
  monitoring_logs:

networks:
  trader-net:
    driver: bridge